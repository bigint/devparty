image:
  file: .gitpod.dockerfile

tasks:
  - name: Setup
    init: >
      npm install;
      cp .env.example .env;
      echo "BASE_URL=\"$(gp url 3000)\"" >> .env;
      npm run prisma:migrate;
      npm run prisma:seed;
      npm run prepare;
      gp sync-done setup;
    command: npm run codegen:graphql --watch
  - name: Prisma Studio
    init: gp sync-await setup
    command: BROWSER=none npm run prisma studio
  - name: Dev Server
    before: redis-server &
    init: gp sync-await setup
    command: npm run dev

ports:
  - port: 3000 # Web app
    onOpen: open-browser
    visibility: public
  - port: 5555 # Prisma Studio
    onOpen: notify
    visibility: public
  - port: 6379 # Redis
    onOpen: ignore
  - port: 3306 # MySQL
    onOpen: ignore

vscode:
  extensions:
    - dbaeumer.vscode-eslint
    - mikestead.dotenv
    - graphql.vscode-graphql
    - christian-kohler.npm-intellisense
    - esbenp.prettier-vscode
    - prisma.prisma
    - eamodio.gitlens
    - pflannery.vscode-versionlens
    - wix.vscode-import-cost
    - formulahendry.auto-close-tag
    - github.github-vscode-theme
    - gitlab.gitlab-workflow
    - bradlc.vscode-tailwindcss
    - bierner.markdown-preview-github-styles
    - editorconfig.editorconfig
    - pkief.material-icon-theme
