include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/License-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

image: node:latest

variables:
  SAST_EXCLUDED_PATHS: 'node_modules, .next, package-lock.json'
  SECRET_DETECTION_EXCLUDED_PATHS: 'node_modules, .next, package-lock.json'

cache:
  paths:
    - node_modules/
    - .next/cache/

.prepare:
  before_script:
    - cp .env.example .env
    - npm run install --frozen-lockfile --silent

lint:
  extends: .prepare
  script:
    - npm run lint

prettier:
  extends: .prepare
  script:
    - npm run prettier:check

generate:
  extends: .prepare
  script:
    - npm run generate

typecheck:
  extends: .prepare
  script:
    - npm run generate
    - npm run typecheck

build:
  extends: .prepare
  script:
    - npm run build

migrate:
  extends: .prepare
  script:
    - npm run prisma migrate reset --force
    - npm run prisma migrate deploy
  only:
    - main
  when: manual

housekeeping:
  before_script: []
  script:
    - curl --request POST --header "PRIVATE-TOKEN:$ACCESS_TOKEN" https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/housekeeping
  only:
    - main
